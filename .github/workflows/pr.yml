name: PR

on:
  pull_request:

jobs:
  license:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: License validator
        uses: './.github/actions/license'

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: ESLint
        uses: './.github/actions/eslint'

      - name: Stylelint
        uses: './.github/actions/stylelint'

  typescript:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Detect TypeScript-impacting changes
        id: typescript_changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(src/|package\.json$|pnpm-lock\.yaml$|tsconfig\.json$|vite\.config\.ts$|vitest\.config\.ts$|\.github/actions/typescript/)'; then
            echo "run_typescript=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_typescript=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip TypeScript
        if: steps.typescript_changes.outputs.run_typescript != 'true'
        run: echo "Skipping TypeScript because this PR does not change TypeScript inputs."

      - name: TypeScript
        if: steps.typescript_changes.outputs.run_typescript == 'true'
        uses: './.github/actions/typescript'

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Detect unit-test-impacting changes
        id: unit_changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(src/|tests/|package\.json$|pnpm-lock\.yaml$|tsconfig\.json$|vite\.config\.ts$|vitest\.config\.ts$)'; then
            echo "run_unit_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_unit_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip unit tests
        if: steps.unit_changes.outputs.run_unit_tests != 'true'
        run: echo "Skipping unit tests because this PR does not change unit-test inputs."

      - name: Setup pnpm
        if: steps.unit_changes.outputs.run_unit_tests == 'true'
        uses: pnpm/action-setup@v2
        with:
          version: 10.10.0

      - name: Install dependencies
        if: steps.unit_changes.outputs.run_unit_tests == 'true'
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Run unit tests
        if: steps.unit_changes.outputs.run_unit_tests == 'true'
        run: pnpm test:unit
        shell: bash

      - name: Archive test results
        if: always() && steps.unit_changes.outputs.run_unit_tests == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: reports/unit/
          retention-days: 5

  pr-build:
    needs: [license, lint, typescript, unit-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      short_sha: ${{ steps.set_short_sha.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.10.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Set SHORT_SHA
        id: set_short_sha
        run: |
          SHORT_SHA=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build Chrome extension
        run: pnpm build:chromium
        shell: bash

      - name: Check Chrome build
        run: pnpm check:chrome-build
        shell: bash

      - name: Pack Chrome build folder to ZIP-file
        run: |
          cd build/chrome
          zip -r ../../cloudhood-chrome-${{ steps.set_short_sha.outputs.short_sha }}.zip .

      - name: Build Firefox extension
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
        run: pnpm build:firefox
        shell: bash

      - name: Check Firefox build
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
        run: pnpm check:firefox-build
        shell: bash

      - name: Pack Firefox build folder to ZIP-file
        run: |
          cd build/firefox
          zip -r ../../cloudhood-firefox-${{ steps.set_short_sha.outputs.short_sha }}.zip .

      - name: Build Firefox sources ZIP-file
        run: pnpm run build:firefox-sources
        shell: bash

      - name: Rename Firefox sources ZIP-file
        run: mv cloudhood-firefox-sources.zip cloudhood-firefox-sources-${{ steps.set_short_sha.outputs.short_sha }}.zip

      - name: Pull request artifacts
        uses: gavv/pull-request-artifacts@v1.1.0
        with:
          commit: ${{ steps.set_short_sha.outputs.short_sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          artifacts-branch: artifacts
          artifacts: |
            cloudhood-chrome-${{ steps.set_short_sha.outputs.short_sha }}.zip
            cloudhood-firefox-${{ steps.set_short_sha.outputs.short_sha }}.zip
            cloudhood-firefox-sources-${{ steps.set_short_sha.outputs.short_sha }}.zip

      - name: Upload Chrome build artifact
        uses: actions/upload-artifact@v7
        with:
          name: cloudhood-chrome-${{ steps.set_short_sha.outputs.short_sha }}
          path: cloudhood-chrome-${{ steps.set_short_sha.outputs.short_sha }}.zip

      - name: Upload Firefox build artifact
        uses: actions/upload-artifact@v7
        with:
          name: cloudhood-firefox-${{ steps.set_short_sha.outputs.short_sha }}
          path: cloudhood-firefox-${{ steps.set_short_sha.outputs.short_sha }}.zip

      - name: Upload Firefox sources artifact
        uses: actions/upload-artifact@v7
        with:
          name: cloudhood-firefox-sources-${{ steps.set_short_sha.outputs.short_sha }}
          path: cloudhood-firefox-sources-${{ steps.set_short_sha.outputs.short_sha }}.zip

  e2e-test:
    runs-on: ubuntu-latest
    needs: [pr-build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect E2E-impacting changes
        id: e2e_changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(src/|tests/e2e/|docker/|docker-compose\.screenshots\.yml$|manifest\.(chromium|firefox)\.json$|package\.json$|pnpm-lock\.yaml$|playwright\.config\.ts$|vite(\.background)?\.config\.ts$|scripts/(firefox-e2e|firefox-screenshots|lib/))'; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip E2E tests
        if: steps.e2e_changes.outputs.run_e2e != 'true'
        run: echo "Skipping extension E2E tests because this PR does not change extension runtime, E2E, or screenshot inputs."

      - name: Set short SHA
        if: steps.e2e_changes.outputs.run_e2e == 'true'
        id: set_short_sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Setup pnpm
        if: steps.e2e_changes.outputs.run_e2e == 'true'
        uses: pnpm/action-setup@v2
        with:
          version: 10.10.0

      - name: Setup Node
        if: steps.e2e_changes.outputs.run_e2e == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.e2e_changes.outputs.run_e2e == 'true'
        run: pnpm install --frozen-lockfile

      - name: Download Chrome build artifact
        if: steps.e2e_changes.outputs.run_e2e == 'true'
        uses: actions/download-artifact@v8
        with:
          name: cloudhood-chrome-${{ needs.pr-build.outputs.short_sha }}

      - name: Extract Chrome extension
        if: steps.e2e_changes.outputs.run_e2e == 'true'
        run: |
          mkdir -p build/chrome
          unzip -o cloudhood-chrome-${{ needs.pr-build.outputs.short_sha }}.zip -d build/chrome

      - name: Download Firefox build artifact
        if: steps.e2e_changes.outputs.run_e2e == 'true'
        uses: actions/download-artifact@v8
        with:
          name: cloudhood-firefox-${{ needs.pr-build.outputs.short_sha }}

      - name: Extract Firefox extension
        if: steps.e2e_changes.outputs.run_e2e == 'true'
        run: |
          mkdir -p build/firefox
          unzip -o cloudhood-firefox-${{ needs.pr-build.outputs.short_sha }}.zip -d build/firefox

      - name: Build Playwright screenshot image
        if: steps.e2e_changes.outputs.run_e2e == 'true'
        run: docker compose -f docker-compose.screenshots.yml build screenshots

      - name: Run functional E2E tests in container
        if: steps.e2e_changes.outputs.run_e2e == 'true'
        run: docker compose -f docker-compose.screenshots.yml run --rm screenshots sh -lc "pnpm install --frozen-lockfile && pnpm test:e2e:ci"

      - name: Run Firefox functional E2E tests in container
        if: steps.e2e_changes.outputs.run_e2e == 'true'
        run: docker compose -f docker-compose.screenshots.yml run --rm screenshots sh -lc "pnpm install --frozen-lockfile && pnpm test:e2e:firefox"

      - name: Run screenshot tests in container
        if: steps.e2e_changes.outputs.run_e2e == 'true'
        run: docker compose -f docker-compose.screenshots.yml run --rm screenshots sh -lc "pnpm install --frozen-lockfile && pnpm build && pnpm test:e2e:screenshots"

  pre-publish:
    needs: [pr-build, e2e-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download Chrome build artifact
        uses: actions/download-artifact@v8
        with:
          name: cloudhood-chrome-${{ needs.pr-build.outputs.short_sha }}
          path: dist/chrome

      - name: Download Firefox build artifact
        uses: actions/download-artifact@v8
        with:
          name: cloudhood-firefox-${{ needs.pr-build.outputs.short_sha }}
          path: dist/firefox

      - name: Download Firefox sources artifact
        uses: actions/download-artifact@v8
        with:
          name: cloudhood-firefox-sources-${{ needs.pr-build.outputs.short_sha }}
          path: dist/firefox-sources

      - name: Extract builds for release checks
        run: |
          mkdir -p build/chrome build/firefox
          unzip -o dist/chrome/cloudhood-chrome-${{ needs.pr-build.outputs.short_sha }}.zip -d build/chrome
          unzip -o dist/firefox/cloudhood-firefox-${{ needs.pr-build.outputs.short_sha }}.zip -d build/firefox

      - name: Check release builds
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
        run: node scripts/check-extension-builds.mjs

      - name: Publish Chrome Extension (Dry Run)
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_PUBLISH_TARGET: ${{ secrets.CHROME_PUBLISH_TARGET }}
        run: |
          npx --yes publish-browser-extension@4.0.4 \
            --dry-run \
            --chrome-zip dist/chrome/cloudhood-chrome-${{ needs.pr-build.outputs.short_sha }}.zip \
            --chrome-extension-id ${{ env.CHROME_EXTENSION_ID }} \
            --chrome-client-id ${{ env.CHROME_CLIENT_ID }} \
            --chrome-client-secret ${{ env.CHROME_CLIENT_SECRET }} \
            --chrome-refresh-token ${{ env.CHROME_REFRESH_TOKEN }} \
            --chrome-publish-target ${{ env.CHROME_PUBLISH_TARGET }}

      - name: Publish Firefox Extension (Dry Run)
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
        run: |
          npx --yes publish-browser-extension@4.0.4 \
            --dry-run \
            --firefox-zip dist/firefox/cloudhood-firefox-${{ needs.pr-build.outputs.short_sha }}.zip \
            --firefox-sources-zip dist/firefox-sources/cloudhood-firefox-sources-${{ needs.pr-build.outputs.short_sha }}.zip \
            --firefox-extension-id ${{ env.FIREFOX_EXTENSION_ID }} \
            --firefox-jwt-issuer ${{ env.FIREFOX_JWT_ISSUER }} \
            --firefox-jwt-secret ${{ env.FIREFOX_JWT_SECRET }}
